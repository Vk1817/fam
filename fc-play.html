<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRICKCAST LIVE · Player</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; font-family: system-ui, -apple-system, sans-serif; }

    body {
      position: absolute;
      margin: 0; padding: 0;
      background-color: #000;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100%; width: 100%;
    }

    .video-container {
      position: absolute;
      width: 100%; height: 100%;
      aspect-ratio: 16/9;
      background-color: #000;
      border-radius: 1px;
      overflow: hidden;
      box-shadow: 0 4px 2px rgba(0,0,0,0.5);
    }

    .shaka-video-container {
      position: absolute;
      width: 100%; height: 100%;
    }

    video { width: 100%; height: 100%; background-color: #000; }

    @media (max-width: 768px) {
      body { width: 100%; height: 100%; padding: 1px; }
      .video-container { max-width: 100%; height: 100%; }
      .brand-watermark { font-size: 10px !important; right: 5px !important; top: 6px !important; }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .video-container { max-width: 854px; }
    }

    /* Brand watermark */
    .brand-watermark {
      position: absolute;
      right: 8px; top: 10px;
      z-index: 1000;
      pointer-events: none;
      opacity: 0.8;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #00e5ff;
      text-shadow: 0 0 12px rgba(0,229,255,0.6), 0 0 4px rgba(0,0,0,0.8);
      font-family: 'Arial Black', sans-serif;
      text-transform: uppercase;
    }

    /* ── Shaka YouTube-style theme ── */
    @font-face { font-family:'Roboto'; font-weight:400; src:url(https://fonts.gstatic.com/s/roboto/v27/KFOmCnqEu92Fr1Me5Q.ttf) format('truetype'); }
    @font-face { font-family:'Roboto'; font-weight:500; src:url(https://fonts.gstatic.com/s/roboto/v27/KFOlCnqEu92Fr1MmEU9vAw.ttf) format('truetype'); }
    .youtube-theme { font-family:'Roboto',sans-serif; }
    .youtube-theme .shaka-bottom-controls { width:100%; padding:0; z-index:1; display:flex; flex-direction:column; }
    .youtube-theme .shaka-ad-controls { order:1; }
    .youtube-theme .shaka-controls-button-panel { order:2; height:60px; padding:0 10px; }
    .youtube-theme .shaka-range-container { margin:4px 10px; top:0; }
    .youtube-theme .shaka-small-play-button { order:-3; }
    .youtube-theme .shaka-mute-button { order:-2; }
    .youtube-theme .shaka-controls-button-panel > * { margin:0; padding:3px 8px; color:#EEE; height:60px; }
    .youtube-theme .shaka-controls-button-panel > *:focus { outline:none; box-shadow:inset 0 0 0 2px rgba(0,229,255,0.6); color:#FFF; }
    .youtube-theme .shaka-controls-button-panel > *:hover { color:#FFF; }
    .youtube-theme .shaka-controls-button-panel .shaka-volume-bar-container { position:relative; z-index:10; left:-1px; order:-1; opacity:0; width:0; transition:width 0.2s; height:3px; padding:0; }
    .youtube-theme .shaka-controls-button-panel .shaka-volume-bar-container:hover,
    .youtube-theme .shaka-controls-button-panel .shaka-volume-bar-container:focus { display:block; width:50px; opacity:1; padding:0 6px; }
    .youtube-theme .shaka-mute-button:hover + div { opacity:1; width:50px; padding:0 6px; }
    .youtube-theme .shaka-current-time { padding:0 10px; font-size:12px; }
    .youtube-theme .shaka-seek-bar-container { height:3px; position:relative; top:-1px; border-radius:0; margin-bottom:0; }
    .youtube-theme .shaka-seek-bar-container .shaka-range-element { opacity:0; }
    .youtube-theme .shaka-seek-bar-container:hover { height:5px; top:0; cursor:pointer; }
    .youtube-theme .shaka-seek-bar-container:hover .shaka-range-element { opacity:1; cursor:pointer; }
    .youtube-theme .shaka-seek-bar-container input[type=range]::-webkit-slider-thumb { background:#00e5ff; cursor:pointer; }
    .youtube-theme .shaka-seek-bar-container input[type=range]::-moz-range-thumb { background:#00e5ff; cursor:pointer; }
    .youtube-theme .shaka-overflow-menu,
    .youtube-theme .shaka-settings-menu { border-radius:2px; background:rgba(28,28,28,0.9); transition:opacity 0.1s; user-select:none; right:10px; bottom:50px; padding:8px 0; min-width:200px; }
    .youtube-theme .shaka-settings-menu { padding:0 0 8px 0; }
    .youtube-theme .shaka-settings-menu button { font-size:12px; }
    .youtube-theme .shaka-settings-menu button span { margin-left:33px; font-size:13px; }
    .youtube-theme .shaka-overflow-menu button { padding:0; }
    .youtube-theme .shaka-overflow-menu button i { display:none; }
    .youtube-theme .shaka-overflow-menu button .shaka-overflow-button-label { display:flex; justify-content:space-between; flex-direction:row; align-items:center; cursor:default; outline:none; height:60px; flex:0 0 100%; }
    .youtube-theme .shaka-overflow-menu button .shaka-overflow-button-label span { flex-shrink:initial; padding-left:15px; font-size:13px; font-weight:500; display:flex; align-items:center; }
    .youtube-theme .shaka-overflow-menu span+span { color:#FFF; font-weight:400!important; font-size:12px!important; padding-right:8px; padding-left:0!important; }
    .youtube-theme .shaka-overflow-menu span+span:after { content:"navigate_next"; font-family:'Material Icons Sharp'; font-size:20px; }
    .youtube-theme .shaka-back-to-overflow-button { padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.2); font-size:12px; color:#eee; height:60px; }
    .youtube-theme .shaka-overflow-menu button:hover,
    .youtube-theme .shaka-settings-menu button:hover { background-color:rgba(255,255,255,0.1); cursor:pointer; }
    .youtube-theme .shaka-overflow-menu button,
    .youtube-theme .shaka-settings-menu button { color:#EEE; }
    .youtube-theme .shaka-overflow-menu-button { font-size:18px; margin-right:5px; }
    .youtube-theme .shaka-fullscreen-button:hover { font-size:25px; transition:font-size 0.1s; }
    .shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg { display:none!important; visibility:hidden!important; opacity:0!important; }
    .youtube-theme .shaka-seek-bar { background:rgba(255,255,255,.2)!important; }
    .youtube-theme .shaka-buffered-range { background:rgba(255,255,255,.4)!important; }
    .youtube-theme .shaka-played-range { background:#00e5ff!important; }

    /* Back to home button */
    .home-btn {
      position: absolute;
      top: 12px; left: 12px;
      z-index: 2000;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,229,255,0.2);
      color: #00e5ff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .home-btn:hover { background: rgba(0,229,255,0.15); }

    /* Telegram popup */
    .tg-popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0.95);
      background: rgba(8,14,24,0.97);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(0,229,255,0.2);
      padding: 2.5rem 2rem;
      border-radius: 20px;
      z-index: 10000;
      text-align: center;
      width: 90%; max-width: 400px;
      display: none;
      box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 40px rgba(0,229,255,0.06);
      animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
    }
    @keyframes popIn { to { opacity:1; transform:translate(-50%,-50%) scale(1); } }
    .tg-popup .icon { font-size:46px; display:block; margin-bottom:12px; }
    .tg-popup h2 { color:#f0f6ff; font-size:1.4rem; font-weight:900; margin-bottom:8px; letter-spacing:2px; text-transform:uppercase; }
    .tg-popup p { color:#6b85a8; font-size:0.88rem; margin-bottom:1.5rem; line-height:1.7; }
    .tg-popup .btn { width:100%; padding:0.9rem; margin-top:0.6rem; border-radius:12px; cursor:pointer; font-weight:700; font-size:0.95rem; text-decoration:none; display:inline-block; transition:transform 0.2s; border:none; }
    .tg-popup .join { background:linear-gradient(135deg,#00e5ff,#7b61ff); color:#000; box-shadow:0 4px 20px rgba(0,229,255,0.3); }
    .tg-popup .join:hover { transform:translateY(-2px); }
    .tg-popup .skip { background:transparent; color:#6b85a8; border:1px solid rgba(255,255,255,0.1); margin-top:8px; }
    .tg-popup .skip:hover { background:rgba(255,255,255,0.05); color:#f0f6ff; }
  </style>
</head>

<!-- Telegram Popup -->
<div class="tg-popup" id="tgPopup">
  <span class="icon">📡</span>
  <h2>CRICKCAST LIVE</h2>
  <p>Join our Telegram channel for live stream links, match alerts, and more — totally free!</p>
  <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" class="btn join">✈️ Join Telegram Channel</a>
  <button class="btn skip" onclick="document.getElementById('tgPopup').style.display='none'">Already Joined</button>
</div>

<div class="video-container">
  <!-- Back to home -->
  <a href="/" class="home-btn">&#8592; CRICKCAST</a>

  <!-- Brand watermark -->
  <div class="brand-watermark">📡 CRICKCAST</div>

  <div class="shaka-video-container" data-shaka-player>
    <video id="video" autoplay muted playsinline preload="auto"></video>
  </div>
</div>

<script>
  const queryParams = new URLSearchParams(window.location.search);
  const rawUrl = queryParams.get('url');

  // Cloudflare Pages proxy (same as Sayan's architecture)
  const PROXY_BASE = '/api/proxy?u=';
  const url = rawUrl ? PROXY_BASE + encodeURIComponent(rawUrl) : null;

  const streamInfo = { streamUrl: url };
  let player;
  const video = document.getElementById('video');

  async function initializePlayer() {
    try {
      player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        seekBarColors: {
          base: 'rgba(255,255,255,.2)',
          buffered: 'rgba(255,255,255,.4)',
          played: '#00e5ff',
        },
        controlPanelElements: [
          'play_pause','mute','time_and_duration','restart',
          'spacer','quality','language','picture_in_picture','fullscreen','overflow_menu'
        ]
      });

      player.configure({
        streaming: { bufferingGoal:10, rebufferingGoal:2, bufferBehind:30 },
        manifest: { retryParameters: { timeout:30000, maxAttempts:2, baseDelay:1000, backoffFactor:2, fuzzFactor:0.5 } }
      });

      video.autoplay = true;
      video.controls = false;
      video.volume = 1;
      video.muted = false;
      video.preload = 'auto';

      console.log('[CRICKCAST] Loading:', streamInfo.streamUrl);
      await player.load(streamInfo.streamUrl);
      console.log('[CRICKCAST] Stream loaded.');

      const play = async () => {
        try { await video.play(); }
        catch(e) { video.muted = true; try { await video.play(); } catch(e2) {} }
      };

      video.readyState >= 2 ? await play() : video.addEventListener('canplay', play, { once:true });

    } catch(err) {
      console.error('[CRICKCAST] Error:', err);
      video.src = streamInfo.streamUrl;
      video.autoplay = true; video.muted = false;
      try { await video.play(); } catch(e) { video.muted = true; await video.play(); }
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (streamInfo.streamUrl) initializePlayer();
    else console.warn('[CRICKCAST] No stream URL provided');
  });

  // Show Telegram popup after 3 seconds
  setTimeout(() => document.getElementById('tgPopup').style.display = 'block', 3000);
</script>
</html>
