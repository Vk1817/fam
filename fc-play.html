<div class="shaka-video-container" data-shaka-player>
  <video id="video" autoplay muted playsinline preload="auto"></video>
</div></div>


<script>

  const queryParams = new URLSearchParams(window.location.search);
  const rawUrl = queryParams.get('url');

  // Proxy base for CORS bypass
  const PROXY_BASE = '/api/proxy?u=';
  const url = rawUrl ? PROXY_BASE + encodeURIComponent(rawUrl) : null;

  const channelstreamInfo = {
    streamUrl: url,
    authBearer: "",
    streamPoster: "https://raw.githubusercontent.com/abusaeeidx/Tv-Channel-Logo/heads/main/CricHD/runded/1745008895589.png"
  };

  let player;
  const video = document.getElementById('video');

  async function initializePlayer() {
    try {
      // Initialize Shaka Player first for better HLS support
      player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      // Custom UI configuration with seek bar colors
      const config = {
        'seekBarColors': {
          base: 'rgba(255,255,255,.2)',
          buffered: 'rgba(255,255,255,.4)',
          played: 'rgb(255,183,3)',
        },
        'controlPanelElements': [
          'play_pause',
          'mute',
          'time_and_duration',
          'spacer',
          'quality',
          'language',
          'picture_in_picture',
          'fullscreen',
          'overflow_menu'
        ]
      };

      ui.configure(config);
      const controls = ui.getControls();

      // Configure player for better performance
      player.configure({
        streaming: {
          bufferingGoal: 10,
          rebufferingGoal: 2,
          bufferBehind: 30
        },
        manifest: {
          retryParameters: {
            timeout: 30000,
            maxAttempts: 2,
            baseDelay: 1000,
            backoffFactor: 2,
            fuzzFactor: 0.5
          }
        }
      });

      // Set video properties for autoplay
      video.autoplay = true;
      video.controls = false;
      video.volume = 1;
      video.muted = false;
      video.preload = 'auto';

      console.log(`Loading stream: ${channelstreamInfo.streamUrl}`);

      // Surface the real Shaka error (code/category/message) instead of a minified object
      player.addEventListener('error', (event) => {
        const e = event.detail;
        console.error('Shaka runtime error ->', 'code:', e.code, 'category:', e.category, 'severity:', e.severity, 'data:', e.data, 'message:', e.message);
      });

      // Load the stream
      await player.load(channelstreamInfo.streamUrl);

      console.log('Stream loaded successfully.');

      // Force autoplay with multiple attempts
      const attemptAutoplay = async () => {
        try {
          await video.play();
          console.log('Autoplay successful');
        } catch (playError) {
          console.log('Autoplay blocked, trying with muted audio');
          video.muted = true;
          try {
            await video.play();
            console.log('Autoplay successful with muted audio');
          } catch (mutedError) {
            console.log('Autoplay failed completely, user interaction required');
          }
        }
      };

      // Immediate autoplay attempt
      if (video.readyState >= 2) {
        await attemptAutoplay();
      } else {
        video.addEventListener('canplay', attemptAutoplay, { once: true });
      }

    } catch (error) {
      console.error('Error initializing player -> code:', error && error.code,
        'category:', error && error.category,
        'severity:', error && error.severity,
        'data:', error && error.data,
        'message:', error && error.message,
        'raw:', error);

      // Only fall back to a raw <video> src if the browser can actually play HLS natively (Safari/iOS).
      // Every other browser will just throw NotSupportedError on a raw .m3u8, so don't bother there.
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = channelstreamInfo.streamUrl;
        video.autoplay = true;
        video.muted = false;
        try {
          await video.play();
        } catch (fallbackError) {
          video.muted = true;
          await video.play();
        }
      } else {
        console.error('This browser cannot play HLS natively and Shaka failed to load the stream. See the error above for the real cause.');
      }
    }
  }

  // Initialize player when page loads
  document.addEventListener('DOMContentLoaded', () => {
    initializePlayer().catch(error => {
      console.error('Error initializing player:', error);
    });
  });

  // Show popup after delay (2 seconds)
  setTimeout(() => {
    document.getElementById('whatsappPopup').style.display = 'block';
  }, 2000);
</script>
