<script>
const queryParams = new URLSearchParams(window.location.search);
const rawUrl = queryParams.get('url');

// Proxy base for CORS bypass
const PROXY_BASE = '/api/proxy?u=';
const url = rawUrl ? PROXY_BASE + encodeURIComponent(rawUrl) : null;

const channelstreamInfo = {
  streamUrl: url,
  authBearer: "",
  streamPoster: "https://raw.githubusercontent.com/abusaeeidx/Tv-Channel-Logo/heads/main/CricHD/runded/1745008895589.png"
};

let player;
const video = document.getElementById('video');

async function initializePlayer() {
  try {
    player = new shaka.Player();
    await player.attach(video);
    const container = document.querySelector('.shaka-video-container');
    const ui = new shaka.ui.Overlay(player, container, video);

    const config = {
      'seekBarColors': {
        base: 'rgba(255,255,255,.2)',
        buffered: 'rgba(255,255,255,.4)',
        played: '#00e5ff',
      },
      'controlPanelElements': [
        'play_pause', 'mute', 'time_and_duration', 'restart', 'spacer',
        'quality', 'language', 'picture_in_picture', 'fullscreen', 'overflow_menu'
      ]
    };
    ui.configure(config);
    const controls = ui.getControls();

    player.configure({
      streaming: { bufferingGoal: 10, rebufferingGoal: 2, bufferBehind: 30 },
      manifest: {
        retryParameters: { timeout: 30000, maxAttempts: 2, baseDelay: 1000, backoffFactor: 2, fuzzFactor: 0.5 }
      }
    });

    video.autoplay = true;
    video.controls = false;
    video.volume = 1;
    video.muted = false;
    video.preload = 'auto';

    console.log(`Loading stream: ${channelstreamInfo.streamUrl}`);
    await player.load(channelstreamInfo.streamUrl);
    console.log('Stream loaded successfully.');

    const attemptAutoplay = async () => {
      try {
        await video.play();
        console.log('Autoplay successful');
      } catch (playError) {
        console.log('Autoplay blocked, trying with muted audio');
        video.muted = true;
        try {
          await video.play();
          console.log('Autoplay successful with muted audio');
        } catch (mutedError) {
          console.log('Autoplay failed completely, user interaction required');
        }
      }
    };

    if (video.readyState >= 2) {
      await attemptAutoplay();
    } else {
      video.addEventListener('canplay', attemptAutoplay, { once: true });
    }
  } catch (error) {
    console.error('Error initializing player:', error);
    video.src = channelstreamInfo.streamUrl;
    video.autoplay = true;
    video.muted = false;
    try {
      await video.play();
    } catch (fallbackError) {
      video.muted = true;
      await video.play();
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  initializePlayer().catch(error => {
    console.error('Error initializing player:', error);
  });
});

setTimeout(() => {
  document.getElementById('whatsappPopup').style.display = 'block';
}, 2000);
</script>
