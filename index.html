<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FanCode Live Streaming | Watch Free</title>

<link rel="icon" href="https://fancode.com/favicon.ico" type="image/x-icon">
<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
body{background:#02040a;color:white;font-family:Inter;}
</style>
</head>

<body class="text-slate-200">

<header class="text-center py-16 px-4">
<h1 class="text-5xl font-black">CRICKCAST</h1>
<p class="text-slate-300 mt-3">Watch all FanCode matches for free in HD</p>
</header>

<main class="max-w-7xl mx-auto px-4 pb-12">

<div id="matches-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</main>

<script>

const gridContainer = document.getElementById('matches-grid');

const DATA_URL =
"https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

async function fetchAndRender(){

try{

// FIXED (fresh JSON so matches always appear)
const res =
await fetch(DATA_URL + "?v=" + Date.now());

const data =
await res.json();

const matches =
Array.isArray(data.matches) ? data.matches : [];

gridContainer.innerHTML="";

matches.forEach(match=>{

const div=document.createElement("div");

div.className="bg-slate-900 p-4 rounded-lg";

const streams={
...match.STREAMING_CDN,
adfree_stream:match.adfree_stream,
dai_stream:match.dai_stream
};

let buttons="";

for(const [key,value] of Object.entries(streams)){

if(value && value!=="Unavailable" && key!=="Primary_Playback_URL"){

buttons+=`
<a
href="fc/player.html?id=${match.match_id}&cdn=${key}"
class="block bg-sky-500 text-black text-center mt-2 p-2 rounded">
${key}
</a>
`;

}

}

if(!buttons){

buttons=`<span class="text-xs text-slate-500">
Streams will appear when available
</span>`;

}

div.innerHTML=`

<h3 class="font-bold mb-2">${match.title || "Match"}</h3>

${buttons}

`;

gridContainer.appendChild(div);

});

}catch(err){

gridContainer.innerHTML=
`<p class="text-red-400 text-center">Could not load matches</p>`;

}

}

fetchAndRender();

// FIXED refresh interval (1 minute)
setInterval(fetchAndRender,60000);

</script>

</body>
</html>
