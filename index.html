<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>CRICKCAST LIVE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<style>
:root {
    --bg:#02040a;
    --card:rgba(15,23,42,0.7);
    --border:rgba(255,255,255,0.1);
    --glow:#0ea5e9;
}

body{
    margin:0;
    font-family:Inter, sans-serif;
    background:var(--bg);
    color:white;
    padding-top:70px;
    padding-bottom:80px;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    width:100%;
    height:65px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
    z-index:1000;
}
header h1{
    font-size:22px;
    font-weight:900;
    background:linear-gradient(90deg,#38bdf8,#a855f7,#f59e0b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:18px;
    padding:18px;
}

/* CARD */
.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    backdrop-filter:blur(14px);
    transition:0.3s;
}
.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(14,165,233,0.4);
}
.card img{width:100%;height:150px;object-fit:cover}

/* BADGE */
.badge{
    position:absolute;
    top:10px;
    left:10px;
    padding:5px 10px;
    border-radius:20px;
    font-size:10px;
    font-weight:bold;
    background:red;
}
.badge-up{background:#3b82f6}
.badge-ended{background:#6b7280}

/* NAV */
nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:black;
}
.nav-btn{
    flex:1;
    color:#888;
    background:none;
    border:none;
}
.nav-btn.active{color:#38bdf8}

/* PLAYER */
.player{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    flex-direction:column;
    z-index:3000;
}
.player.active{display:flex}

.player-header{
    height:55px;
    display:flex;
    align-items:center;
    padding:0 10px;
    background:#02040a;
    border-bottom:1px solid var(--border);
}

/* 🔥 BACK BUTTON (VISIBLE FIX ONLY CSS) */
.player-btn{
    color:#38bdf8;
    font-size:20px;
    background:none;
    border:none;
    padding:10px;
    border-radius:6px;
}
.player-btn:hover{
    background:rgba(255,255,255,0.1);
}

.player-title{
    flex:1;
    text-align:center;
    font-size:14px;
    font-weight:600;
}

/* TELEGRAM POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    backdrop-filter:blur(8px);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:5000;
}
.popup.show{display:flex}

.popup-box{
    background:var(--card);
    border:1px solid var(--border);
    padding:25px;
    border-radius:16px;
    text-align:center;
    max-width:320px;
}

.popup h2{
    font-size:20px;
    margin-bottom:10px;
    background:linear-gradient(90deg,#38bdf8,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.popup p{
    font-size:13px;
    color:#ccc;
    margin-bottom:20px;
}

.popup a{
    display:block;
    padding:12px;
    border-radius:8px;
    background:#38bdf8;
    color:black;
    font-weight:bold;
    text-decoration:none;
    margin-bottom:10px;
}

.popup button{
    background:#222;
    border:none;
    color:#aaa;
    padding:10px;
    width:100%;
    border-radius:8px;
}
</style>
</head>

<body>

<header><h1>CRICKCAST LIVE</h1></header>
<main class="grid" id="g"></main>

<nav>
<button class="nav-btn active" onclick="f('all',this)">All</button>
<button class="nav-btn" onclick="f('Cricket',this)">Cricket</button>
<button class="nav-btn" onclick="f('Football',this)">Football</button>
<button class="nav-btn" onclick="f('Tennis',this)">Tennis</button>
</nav>

<!-- PLAYER (UNCHANGED STRUCTURE) -->
<div class="player" id="p">
<div class="player-header">
<button class="player-btn" onclick="cp()">
<i class="fas fa-arrow-left"></i>
</button>
<div class="player-title" id="pt">Playing...</div>
</div>
<div class="player-video">
<video id="v" autoplay playsinline></video>
</div>
</div>

<!-- TELEGRAM POPUP -->
<div class="popup" id="tg">
<div class="popup-box">
<h2>🚀 Join & Never Miss Matches!</h2>
<p>Instant links ⚡ Fast updates 🔥 Exclusive predictions</p>
<a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank">Join Telegram</a>
<button onclick="closePopup()">Later</button>
</div>
</div>

<script>
/* 🔒 EXACT SAME ORIGINAL JS (UNCHANGED) */
const AP="https://a7.akcoder777.workers.dev/fc";
let M=[],ft='all',pi=0;
function pd(s){try{const p=s.replace(/\s+/g,' ').trim().split(' '),m={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};let h=parseInt(p[3])||0,min=parseInt(p[4])||0;if(p[5]==='PM'&&h!==12)h+=12;if(p[5]==='AM'&&h===12)h=0;return new Date(p[2],m[p[1]],p[0],h,min).getTime();}catch(e){return Date.now()+3600000;}}
function fd(ts){if(!ts)return 'TBA';const d=new Date(ts);if(d.toString()==='Invalid Date')return 'TBA';const opt={month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'};return d.toLocaleString('en-US',opt);}
function nm(d){let a=[];(d.matches||[]).forEach(m=>{let r={};if(m.all_resolutions)Object.keys(m.all_resolutions).forEach(x=>{if(m.all_resolutions[x]?.includes('.m3u8'))r[x]=m.all_resolutions[x];});const isLive=['live','LIVE','started','STARTED'].includes(m.type||m.status);a.push({id:m.match_id||Math.random(),t:m.match,tr:m.tournament,c:m.category,l:m.language,img:m.image,li:isLive,en:!isLive,u:m.stream_url||r['1080p']||r['720p']||'',r:r,tm:pd(m.startTime)});});(d.upcoming_matches||[]).forEach(m=>{a.push({id:m.match_id||Math.random(),t:m.match,tr:m.tournament,c:m.category,l:m.language,img:m.image,li:false,en:false,u:'',r:{},tm:pd(m.startTime)});});return a.sort((a,b)=>(b.li?1:0)-(a.li?1:0)||a.tm-b.tm);}
function rn(){const f=ft==='all'?M:M.filter(m=>m.c?.toLowerCase()===ft.toLowerCase());document.getElementById('g').innerHTML=!f.length?'<div class="loader"><i class="fas fa-inbox"></i><p>No matches</p></div>':f.map(m=>{const badgeText=m.li?'LIVE':m.en?'ENDED':'UPCOMING';const badgeClass=m.li?'':m.en?'badge-ended':'badge-up';return `<div class="card" onclick="pl(${M.indexOf(m)})"><div class="card-img"><img src="${m.img||'https://via.placeholder.com/250x140'}"><span class="badge ${badgeClass}">${badgeText}</span></div><div class="card-info"><div class="card-title">${m.t}</div></div></div>`}).join('');}
function pl(i){if(M[i].en){alert('Match Ended');return;}if(!M[i].li){alert('Starts: '+fd(M[i].tm));return;}if(Object.keys(M[i].r).length>1)sq(i);else if(M[i].u)ps(M[i],M[i].u);else alert('No stream');}
function sq(i){const rs=Object.keys(M[i].r).sort((a,b)=>parseInt(b)-parseInt(a));document.getElementById('ql').innerHTML=rs.map(r=>`<button onclick="ps(M[${i}],M[${i}].r['${r}']);cm()">${r}</button>`).join('');document.getElementById('qm').classList.add('active');}
async function ps(m,u){if(!u)return;document.getElementById('pt').innerText=m.t;document.getElementById('p').classList.add('active');const v=document.getElementById('v');v.currentTime=0;try{if(!pi){window.player=new Plyr('#v');pi=1;}v.src=u;v.type='application/x-mpegURL';await v.load();setTimeout(()=>{v.play().catch(e=>{v.muted=true;v.play();})},100);}catch(e){v.src=u;v.type='application/x-mpegURL';v.play().catch(()=>{v.muted=true;v.play();});}}
function f(t,b){ft=t;document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');rn();}
function cm(){document.getElementById('qm').classList.remove('active');}
function cp(){document.getElementById('p').classList.remove('active');const v=document.getElementById('v');v.pause();v.currentTime=0;v.src='';if(window.player){try{window.player.destroy();}catch(e){}pi=0;}}
async function ld(){try{const r=await fetch(AP);const d=await r.json();M=nm(d);rn();showPopup();}catch(e){document.getElementById('g').innerHTML='Load Error';}}
ld();

/* TELEGRAM POPUP (NEW - SAFE) */
function showPopup(){
if(!localStorage.getItem("tg")){
setTimeout(()=>document.getElementById('tg').classList.add('show'),3000);
}}
function closePopup(){
document.getElementById('tg').classList.remove('show');
localStorage.setItem("tg","1");
}
</script>

</body>
</html>
