<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRICKCAST</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#02040a;
color:white;
font-family:Arial;
}
.card{
background:#0f172a;
border-radius:10px;
overflow:hidden;
transition:.3s;
}
.card:hover{
transform:translateY(-5px);
}
.watch{
background:#0ea5e9;
padding:6px 12px;
border-radius:6px;
font-size:12px;
font-weight:bold;
display:inline-block;
}
</style>

</head>

<body>

<header class="text-center py-10">
<h1 class="text-5xl font-bold">CRICKCAST</h1>
<p class="text-slate-400 mt-2">Watch FanCode matches free</p>
</header>

<main class="max-w-6xl mx-auto px-4">

<div id="grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
<div class="text-center text-slate-400">Loading matches...</div>
</div>

</main>

<script>

const DATA_URL =
"https://raw.githubusercontent.com/drmlive/fancode-live-events/main/fancode.json";

async function loadMatches(){

const grid=document.getElementById("grid");

try{

const res=await fetch(DATA_URL);
const data=await res.json();

grid.innerHTML="";

data.matches.forEach(match=>{

/* extract real stream */

let streamUrl="";

if(match.auto_streams && match.auto_streams.length>0){

const raw = match.auto_streams[0].auto || "";

const found = raw.match(/https:\/\/[^\s]+\.m3u8/);

if(found) streamUrl = found[0];

}

/* create card */

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${match.thumbnail || ''}" class="w-full h-40 object-cover">

<div class="p-4">

<h3 class="font-bold">${match.match_name || ''}</h3>

<p class="text-slate-400 text-sm mt-1">${match.event_name || ''}</p>

<a href="player.html?url=${encodeURIComponent(streamUrl)}"
class="watch mt-3 inline-block">
WATCH
</a>

</div>

`;

grid.appendChild(card);

});

}catch(err){

grid.innerHTML="<p class='text-red-400'>Failed to load matches</p>";

}

}

loadMatches();

setInterval(loadMatches,120000);

</script>

</body>
</html>
