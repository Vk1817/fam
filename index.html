<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CRICKCAST LIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<meta name="referrer" content="no-referrer">
<style>
:root{
  --bg:#04080f;--bg2:#080e1a;--bg3:#0c1424;--bg4:#111c30;
  --accent:#00e5ff;--accent2:#ff4d6d;--accent3:#7b61ff;
  --ag:linear-gradient(135deg,#00e5ff,#7b61ff);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--border3:rgba(0,229,255,0.2);
  --t1:#f0f6ff;--t2:#6b85a8;--t3:#2d4060;
  --font-d:'Bebas Neue',sans-serif;--font-b:'DM Sans',sans-serif;
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-b);background:var(--bg);color:var(--t1);overflow-x:hidden;min-height:100vh;padding-bottom:80px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 50% at 50% -10%,rgba(0,229,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 90% 80%,rgba(123,97,255,0.05) 0%,transparent 50%),
    radial-gradient(ellipse 30% 30% at 5% 50%,rgba(0,229,255,0.03) 0%,transparent 50%);}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);
  background-size:48px 48px;mask-image:radial-gradient(ellipse 100% 100% at 50% 50%,black 20%,transparent 100%);}
header{position:sticky;top:0;z-index:900;height:62px;display:flex;align-items:center;padding:0 20px;gap:16px;
  background:rgba(4,8,15,0.93);backdrop-filter:blur(28px) saturate(180%);border-bottom:1px solid var(--border);}
.hd-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.hd-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--ag);font-size:14px;color:#000;flex-shrink:0;}
.hd-name{font-family:var(--font-d);font-size:22px;letter-spacing:3px;background:var(--ag);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hd-spacer{flex:1;}
.hd-tg{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;text-decoration:none;background:rgba(0,229,255,0.08);border:1px solid var(--border3);font-size:12px;font-weight:600;color:var(--accent);transition:all .2s;}
.hd-tg:hover{background:rgba(0,229,255,0.15);}
.hd-live-badge{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;background:rgba(255,77,109,0.12);border:1px solid rgba(255,77,109,0.25);font-size:10px;font-weight:700;letter-spacing:2px;color:#ff8fa3;}
.hd-live-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:blink 1.1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.65);}}
.hero{position:relative;z-index:1;padding:44px 20px 36px;max-width:900px;margin:0 auto;text-align:center;}
.hero-label{display:inline-flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);padding:5px 16px;border-radius:20px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.18);margin-bottom:16px;}
.hero-title{font-family:var(--font-d);font-size:clamp(52px,10vw,96px);letter-spacing:6px;line-height:.95;background:linear-gradient(160deg,#ffffff 0%,#b8d4f8 40%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px;}
.hero-sub{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:36px;}
.hero-sub b{color:var(--t1);}
.stats{display:inline-flex;border:1px solid var(--border2);border-radius:16px;overflow:hidden;background:rgba(8,14,26,0.8);backdrop-filter:blur(16px);}
.stat{padding:16px 30px;text-align:center;position:relative;}
.stat+.stat::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:1px;background:var(--border);}
.stat-label{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:6px;}
.stat-val{font-family:var(--font-d);font-size:34px;line-height:1;}
.stat-val.red{color:var(--accent2);text-shadow:0 0 22px rgba(255,77,109,.35);}
.stat-val.cyan{color:var(--accent);text-shadow:0 0 22px rgba(0,229,255,.3);}
.stat-val.purple{color:var(--accent3);text-shadow:0 0 22px rgba(123,97,255,.3);}
.filter-bar{position:sticky;top:62px;z-index:800;padding:10px 20px;background:rgba(4,8,15,0.95);backdrop-filter:blur(22px);border-bottom:1px solid var(--border);}
.filter-inner{max-width:1200px;margin:0 auto;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;}
.filter-inner::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;border:1px solid var(--border);color:var(--t2);background:rgba(255,255,255,0.03);transition:all .18s;white-space:nowrap;font-family:var(--font-b);}
.pill:hover{background:rgba(255,255,255,0.06);color:var(--t1);}
.pill.active{background:rgba(0,229,255,0.1);border-color:var(--border3);color:var(--accent);}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px var(--accent2);}
.dot-up{width:6px;height:6px;border-radius:50%;background:var(--accent3);}
.grid-wrap{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:20px 20px;}
.section-label{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px;}
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;transition:transform .28s cubic-bezier(.34,1.56,.64,1),box-shadow .28s,border-color .28s;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card:hover{transform:translateY(-6px) scale(1.015);border-color:rgba(0,229,255,0.25);box-shadow:0 22px 48px rgba(0,0,0,.7),0 0 32px rgba(0,229,255,0.06);}
.card-thumb{position:relative;height:150px;overflow:hidden;background:var(--bg4);}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease;display:block;}
.card:hover .card-thumb img{transform:scale(1.08);}
.card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05) 0%,transparent 40%,rgba(4,8,15,.8) 100%);}
.sport-tag{position:absolute;top:0;right:0;z-index:2;background:rgba(0,0,0,.55);backdrop-filter:blur(8px);padding:4px 10px;border-bottom-left-radius:8px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2);}
.badge{position:absolute;top:10px;left:10px;z-index:3;display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 9px;border-radius:5px;}
.badge-live{background:var(--accent2);color:#fff;box-shadow:0 0 14px rgba(255,77,109,.5);}
.badge-live::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:blink .9s infinite;}
.badge-up{background:rgba(123,97,255,.25);border:1px solid rgba(123,97,255,.35);color:#b0a0ff;}
.teams-row{position:absolute;bottom:8px;left:10px;z-index:2;display:flex;align-items:center;gap:6px;}
.team-logo{width:24px;height:24px;border-radius:50%;object-fit:contain;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.15);}
.team-vs{font-size:8px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1px;}
.play-overlay{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.play-btn{width:50px;height:50px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:17px;color:#000;transform:scale(.7);transition:transform .25s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 30px rgba(0,229,255,.35);}
.card:hover .play-overlay{opacity:1;}
.card:hover .play-btn{transform:scale(1);}
.card-body{padding:12px 14px 14px;background:linear-gradient(180deg,var(--bg3) 0%,var(--bg4) 100%);}
.card-title{font-family:var(--font-b);font-size:14px;font-weight:700;color:var(--t1);line-height:1.3;margin-bottom:4px;}
.card-tourn{font-size:11px;color:var(--t2);display:flex;align-items:center;gap:4px;margin-bottom:10px;}
.card-tourn i{font-size:9px;color:var(--accent);}
.card-foot{border-top:1px solid var(--border);padding-top:9px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--t2);}
.card-time{display:flex;align-items:center;gap:4px;}
.card-time i{font-size:9px;color:var(--accent3);}
.lang-tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(123,97,255,.15);color:#b0a0ff;letter-spacing:.5px;}
.loader{grid-column:1/-1;text-align:center;padding:80px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;}
.spin{width:46px;height:46px;border-radius:50%;border:3px solid rgba(0,229,255,.1);border-top-color:var(--accent);animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--t3);}
.empty i{font-size:32px;opacity:.3;display:block;margin-bottom:10px;}
nav{position:fixed;bottom:0;width:100%;height:68px;z-index:900;display:flex;background:rgba(4,8,15,0.97);backdrop-filter:blur(28px);border-top:1px solid var(--border);}
.nb{flex:1;border:none;background:none;color:var(--t3);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:var(--font-b);position:relative;transition:color .2s;}
.nb i{font-size:19px;}
.nb.active{color:var(--accent);}
.nb.active::before{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:0 0 4px 4px;}
.modal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.75);backdrop-filter:blur(20px);align-items:flex-end;justify-content:center;padding:20px;}
.modal.open{display:flex;}
.modal-box{background:var(--bg3);border:1px solid var(--border2);border-radius:20px 20px 14px 14px;padding:10px 22px 22px;width:100%;max-width:420px;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-handle{width:34px;height:3px;border-radius:2px;background:var(--border2);margin:10px auto 18px;}
.modal-heading{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--t3);text-align:center;margin-bottom:14px;}
#qlist{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
#qlist button{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,0.03);color:var(--t1);font-family:var(--font-b);font-size:13px;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all .15s;}
#qlist button:hover{background:rgba(0,229,255,0.08);border-color:var(--border3);color:var(--accent);}
#qlist button::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.modal-cancel{width:100%;padding:11px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--t3);font-family:var(--font-b);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.modal-cancel:hover{background:rgba(255,255,255,.04);color:var(--t2);}
.player{display:none;position:fixed;inset:0;background:#000;flex-direction:column;z-index:3000;}
.player.open{display:flex;}
.player-hd{height:54px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;gap:10px;background:rgba(4,8,15,.97);border-bottom:1px solid var(--border);}
.p-back{width:36px;height:36px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);background:rgba(255,255,255,.05);color:var(--t1);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.p-back:hover{background:rgba(0,229,255,.1);border-color:var(--border3);color:var(--accent);}
.p-title{flex:1;font-family:var(--font-b);font-size:14px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-live{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ff8fa3;background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.25);padding:4px 10px;border-radius:5px;flex-shrink:0;}
.p-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:blink 1s infinite;}
.p-fs{width:36px;height:36px;border-radius:8px;cursor:pointer;border:1px solid var(--border2);background:rgba(255,255,255,.05);color:var(--t1);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.p-fs:hover{background:rgba(0,229,255,.1);border-color:var(--border3);color:var(--accent);}
.p-wrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#vid{width:100%;height:100%;object-fit:contain;background:#000;}
.f-back{position:absolute;top:14px;left:14px;z-index:9999;width:40px;height:40px;border-radius:10px;cursor:pointer;background:rgba(4,8,15,.72);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.f-back:hover{background:rgba(0,229,255,.15);color:var(--accent);}
.f-fs{position:absolute;top:14px;right:14px;z-index:9999;width:40px;height:40px;border-radius:10px;cursor:pointer;background:rgba(4,8,15,.72);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.f-fs:hover{background:rgba(0,229,255,.15);color:var(--accent);}
.buf{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;width:52px;height:52px;border-radius:50%;border:3px solid rgba(0,229,255,.12);border-top-color:var(--accent);animation:spin .72s linear infinite;pointer-events:none;}
.buf.hide{display:none;}
</style>
</head>

<script>
// ── SOURCE: Vk1817/Fancode_autoupdate → pranav.json (drmlive schema) ──────
const SOURCES = [
  "https://cdn.jsdelivr.net/gh/Vk1817/Fancode_autoupdate@main/pranav.json",
  "https://raw.githubusercontent.com/Vk1817/Fancode_autoupdate/main/pranav.json"
];

let MATCHES = [], filter = 'all', hlsInst = null, curMatch = null;

// ── PARSE drmlive schema ──────────────────────────────────────────────────
// Keys: live_events[], upcoming_events[], headers{}
// Each event: title, tournament, category, language, src/image,
//             dai_url, adfree_url, startTime, teams[], status, streamingStatus
function parseData(d) {
  const out = [];
  const globalHdrs = d.headers || {};

  function add(m, isLive) {
    const title      = m.title || m.name || m.match_name || 'Unknown Match';
    const tournament = m.tournament || m.event_name || m.short_name || m.league || '';
    const category   = m.category || m.sport || m.event_catagory || m.event_category || 'Sport';
    const language   = m.language || '';

    // image
    let img = '';
    if (m.src && typeof m.src === 'object') img = m.src.src || m.src.url || '';
    else if (typeof m.src === 'string') img = m.src;
    img = img || m.image || m.banner || m.thumbnail || m.poster || '';

    // stream URLs — adfree > dai > generic
    const adfree  = m.adfree_url  || m.ad_free_url || '';
    const dai     = m.dai_url     || m.dai_stream  || '';
    const generic = m.stream_link || m.hls_link    || m.stream_url || m.url || '';
    const primaryUrl = adfree || dai || generic;

    const streams = {};
    if (adfree)  streams['⭐ Ad-Free (Best)'] = adfree;
    if (dai)     streams['📺 Standard (DAI)'] = dai;
    if (generic && generic !== adfree && generic !== dai) streams['▶️ Auto'] = generic;

    // teams
    let teams = [];
    if (Array.isArray(m.teams) && m.teams.length >= 2) {
      teams = m.teams.slice(0,2).map(t => ({ logo: t.logo || t.flag || t.image || '' }));
    } else {
      const f1 = m.team_1_flag || m.team1_logo || '';
      const f2 = m.team_2_flag || m.team2_logo || '';
      if (f1) teams.push({ logo: f1 });
      if (f2) teams.push({ logo: f2 });
    }

    const rawT = m.startTime || m.start_time || m.scheduled_at || null;
    const tm   = rawT ? new Date(rawT).getTime() : (isLive ? Date.now() : Date.now() + 7200000);

    out.push({ id: m.match_id || Math.random(), title, tournament, category, language,
      img, teams, isLive, streamUrl: primaryUrl, streams, tm, hdrs: globalHdrs });
  }

  const liveArr     = d.live_events     || d.matches          || [];
  const upcomingArr = d.upcoming_events || d.upcoming_matches  || [];

  const hasStatus = liveArr.some(m => m.status !== undefined);
  if (hasStatus) {
    liveArr.forEach(m => {
      const s  = (m.status || '').toUpperCase();
      const ss = (m.streamingStatus || '').toUpperCase();
      add(m, ['LIVE','STARTED','ONGOING'].includes(s) || ['LIVE','STARTED'].includes(ss));
    });
  } else {
    liveArr.forEach(m => add(m, true));
  }
  upcomingArr.forEach(m => add(m, false));

  return out.sort((a,b) => (b.isLive?1:0)-(a.isLive?1:0) || a.tm-b.tm);
}

const SPORT_ICONS = {
  cricket:'fa-baseball-bat-ball',football:'fa-futbol',soccer:'fa-futbol',
  tennis:'fa-table-tennis-paddle-ball',basketball:'fa-basketball',
  hockey:'fa-hockey-puck',kabaddi:'fa-running',volleyball:'fa-volleyball-ball'
};
function sportIcon(c){ return SPORT_ICONS[(c||'').toLowerCase()]||'fa-trophy'; }

function buildPills() {
  const cats = [...new Set(MATCHES.map(m => m.category))];
  const box  = document.getElementById('pills');
  while (box.children.length > 3) box.removeChild(box.lastChild);
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'pill';
    b.innerHTML = `<i class="fas ${sportIcon(c)}"></i> ${c}`;
    b.onclick = function(){ setFilter(c, this); };
    box.appendChild(b);
  });
}

function fmtTime(ts) {
  if (!ts) return 'TBA';
  const d = new Date(ts);
  return isNaN(d) ? 'TBA' : d.toLocaleString('en-IN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function render() {
  document.getElementById('s-live').textContent  = MATCHES.filter(m=>m.isLive).length;
  document.getElementById('s-total').textContent = MATCHES.length;
  document.getElementById('s-up').textContent    = MATCHES.filter(m=>!m.isLive).length;

  let fm;
  if      (filter==='all')      fm=MATCHES;
  else if (filter==='live')     fm=MATCHES.filter(m=>m.isLive);
  else if (filter==='upcoming') fm=MATCHES.filter(m=>!m.isLive);
  else fm=MATCHES.filter(m=>m.category.toLowerCase()===filter.toLowerCase());

  const g = document.getElementById('grid');
  if (!fm.length){ g.innerHTML=`<div class="empty"><i class="fas fa-inbox"></i><p>No matches right now</p></div>`; return; }

  g.innerHTML = fm.map(m => {
    const idx   = MATCHES.indexOf(m);
    const delay = (fm.indexOf(m)%12)*40;
    const tH = m.teams.length>=2 ? `<div class="teams-row">
      <img class="team-logo" src="${m.teams[0].logo}" onerror="this.style.display='none'" loading="lazy">
      <span class="team-vs">VS</span>
      <img class="team-logo" src="${m.teams[1].logo}" onerror="this.style.display='none'" loading="lazy">
    </div>` : '';
    const fb = `https://placehold.co/300x150/0c1424/00e5ff?text=${encodeURIComponent(m.category)}`;
    return `<div class="card" onclick="openMatch(${idx})" style="animation-delay:${delay}ms">
      <div class="card-thumb">
        <img src="${m.img||fb}" loading="lazy" onerror="this.src='${fb}'">
        <div class="sport-tag">${m.category}</div>
        <div class="badge ${m.isLive?'badge-live':'badge-up'}">${m.isLive?'LIVE':'UPCOMING'}</div>
        ${tH}
        <div class="play-overlay"><div class="play-btn"><i class="fas fa-play"></i></div></div>
      </div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="card-tourn"><i class="fas fa-trophy"></i>${m.tournament||'Tournament'}</div>
        <div class="card-foot">
          <span class="card-time"><i class="fas fa-clock"></i>${fmtTime(m.tm)}</span>
          ${m.language?`<span class="lang-tag">${m.language}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openMatch(idx) {
  const m = MATCHES[idx]; curMatch = m;
  if (!m.isLive){ alert(`⏰ Match not started yet!\nStarts: ${fmtTime(m.tm)}`); return; }
  if (!m.streamUrl && !Object.keys(m.streams).length){ alert('No stream available.'); return; }
  const entries = Object.entries(m.streams);
  if (entries.length<=1){ startPlay(m, m.streamUrl||entries[0]?.[1]); return; }
  document.getElementById('qlist').innerHTML = entries.map(([lbl,url])=>
    `<button onclick="startPlay(curMatch,'${encodeURIComponent(url)}');closeModal()">${lbl}</button>`
  ).join('');
  document.getElementById('modal').classList.add('open');
}

// ── CORS PROXIES — tried in order until one works ─────────────────────────
// FanCode streams block direct browser requests (CORS + Referer check).
// We wrap the URL through a proxy so the browser gets clean HLS data.
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://cors-anywhere.herokuapp.com/${url}`,
  url => url   // last resort: try direct (works on some networks/VPNs)
];

let proxyIndex = 0; // remember which proxy worked last

function proxyUrl(url) {
  return PROXIES[proxyIndex % PROXIES.length](url);
}

function tryNextProxy(m, rawUrl, attempt) {
  if (attempt >= PROXIES.length) {
    document.getElementById('buf').classList.add('hide');
    alert('⚠️ Stream blocked by browser CORS policy.\n\nTry:\n• Using a VPN\n• Opening in VLC with the URL\n• Using Android app instead');
    return;
  }
  proxyIndex = attempt;
  const proxied = PROXIES[attempt](rawUrl);
  console.log(`[Player] Trying proxy ${attempt}: ${proxied}`);
  loadHls(m, rawUrl, proxied, attempt);
}

function loadHls(m, rawUrl, proxiedUrl, attempt) {
  const v = document.getElementById('vid');
  v.pause(); v.src = '';
  if (hlsInst) { try { hlsInst.destroy(); } catch(e){} hlsInst = null; }

  const ua  = (m.hdrs||{})['User-Agent'] || 'Mozilla/5.0';
  const ref = (m.hdrs||{})['Referer']    || 'https://fancode.com/';

  if (Hls.isSupported()) {
    hlsInst = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      // Only set headers on direct (non-proxy) requests
      xhrSetup: function(xhr, url) {
        // corsproxy.io and allorigins handle headers server-side
        // Only inject headers on direct URLs to avoid CORS preflight rejection
        if (attempt === PROXIES.length - 1) {
          try { xhr.setRequestHeader('User-Agent', ua); } catch(e){}
          try { xhr.setRequestHeader('Referer', ref); } catch(e){}
        }
      }
    });
    hlsInst.loadSource(proxiedUrl);
    hlsInst.attachMedia(v);
    hlsInst.on(Hls.Events.MANIFEST_PARSED, () => {
      document.getElementById('buf').classList.add('hide');
      v.play().catch(() => { v.muted = true; v.play(); });
    });
    hlsInst.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        console.warn(`[Player] Proxy ${attempt} failed, trying next...`, data.type);
        hlsInst.destroy(); hlsInst = null;
        tryNextProxy(m, rawUrl, attempt + 1);
      }
    });
  } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari — native HLS, try direct
    v.src = rawUrl; v.load();
    v.play().catch(() => { v.muted = true; v.play(); });
    document.getElementById('buf').classList.add('hide');
  } else {
    document.getElementById('buf').classList.add('hide');
    alert('HLS not supported in this browser.');
  }
}

function startPlay(m, url) {
  if (typeof url === 'string' && !url.startsWith('http') && url.includes('%')) url = decodeURIComponent(url);
  if (!url) { alert('Stream URL not available.'); return; }

  document.getElementById('p-title').textContent = m.title;
  document.getElementById('player').classList.add('open');
  document.getElementById('buf').classList.remove('hide');

  // Start from last known working proxy index for faster load
  tryNextProxy(m, url, proxyIndex);
}

function setFilter(t,btn){ filter=t; document.querySelectorAll('.pill,.nb').forEach(x=>x.classList.remove('active')); btn.classList.add('active'); render(); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
function closePlayer(){
  document.getElementById('player').classList.remove('open');
  const v=document.getElementById('vid'); v.pause(); v.src='';
  if(hlsInst){try{hlsInst.destroy();}catch(e){} hlsInst=null;}
  document.getElementById('fs-icon').className='fas fa-expand';
  document.getElementById('fs-icon2').className='fas fa-expand';
}
function toggleFS(){
  const w=document.getElementById('p-wrap');
  if(!document.fullscreenElement){
    (w.requestFullscreen||w.webkitRequestFullscreen||w.mozRequestFullScreen).call(w);
    document.getElementById('fs-icon').className='fas fa-compress';
    document.getElementById('fs-icon2').className='fas fa-compress';
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen).call(document);
    document.getElementById('fs-icon').className='fas fa-expand';
    document.getElementById('fs-icon2').className='fas fa-expand';
  }
}
document.addEventListener('fullscreenchange',()=>{ if(!document.fullscreenElement){document.getElementById('fs-icon').className='fas fa-expand';document.getElementById('fs-icon2').className='fas fa-expand';}});
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

async function loadData() {
  for (const src of SOURCES) {
    try {
      const res = await fetch(src+'?_='+Date.now());
      if (!res.ok) continue;
      const data = await res.json();
      MATCHES = parseData(data);
      buildPills(); render();
      console.log(`✅ Loaded ${MATCHES.length} matches from ${src}`);
      return;
    } catch(e){ console.warn('Source failed:',src,e); }
  }
  document.getElementById('grid').innerHTML=`<div class="empty"><i class="fas fa-exclamation-triangle"></i><p>Could not load matches.<br>Please refresh your page.</p></div>`;
}

loadData();
setInterval(loadData, 5*60*1000);
</script>
