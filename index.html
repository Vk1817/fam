<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CRICKCAST LIVE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<meta name="referrer" content="no-referrer">

<style>
/* 🔒 SAME CSS (UNCHANGED) */
:root {
    --bg: #02040a;
    --card: rgba(15, 23, 42, 0.6);
    --border: rgba(255,255,255,0.1);
    --glow1: #0ea5e9;
    --glow2: #a855f7;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: #e2e8f0;
    padding-top: 70px;
    padding-bottom: 80px;
    background-image:
        radial-gradient(circle at 20% 20%, rgba(14,165,233,0.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(168,85,247,0.15), transparent 40%);
}

header {
    position: fixed;
    top:0;
    width:100%;
    height:65px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: rgba(2,4,10,0.7);
    backdrop-filter: blur(12px);
    border-bottom:1px solid var(--border);
    z-index:1000;
}

header h1 {
    font-size:22px;
    font-weight:900;
    background: linear-gradient(135deg, #38bdf8, #a855f7, #f59e0b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:18px;
    padding:18px;
    max-width:1400px;
    margin:auto;
}

.card {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    backdrop-filter: blur(16px);
    transition:0.3s;
    position:relative;
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--glow1);
    box-shadow:0 20px 40px rgba(0,0,0,0.6),
               0 0 25px rgba(14,165,233,0.3);
}

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
}

.badge {
    position:absolute;
    top:10px;
    left:10px;
    font-size:10px;
    padding:5px 10px;
    border-radius:20px;
    font-weight:700;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    animation:pulse 2s infinite;
}

.badge-up { background:linear-gradient(135deg,#3b82f6,#6366f1); }
.badge-ended { background:#6b7280; }

@keyframes pulse {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.05); }
}

.card-info {
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.card-title {
    font-size:14px;
    font-weight:700;
    color:white;
}

.card-meta {
    font-size:11px;
    color:#94a3b8;
}

.card-time {
    margin-top:auto;
    font-size:11px;
    padding-top:6px;
    border-top:1px solid var(--border);
}

nav {
    position:fixed;
    bottom:0;
    width:100%;
    height:75px;
    display:flex;
    background: rgba(2,4,10,0.9);
    backdrop-filter: blur(12px);
    border-top:1px solid var(--border);
}

.nav-btn {
    flex:1;
    border:none;
    background:none;
    color:#64748b;
    font-size:11px;
}

.nav-btn.active {
    color:#38bdf8;
}

.nav-btn:hover {
    color:white;
}

.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    justify-content:center;
    align-items:center;
}

.modal.active { display:flex; }

.modal-box {
    background: var(--card);
    border:1px solid var(--border);
    padding:20px;
    border-radius:14px;
}

.modal-box button {
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#0ea5e9,#06b6d4);
    color:black;
    font-weight:600;
}

.player {
    display:none;
    position:fixed;
    inset:0;
    background:black;
    flex-direction:column;
}

.player.active { display:flex; }

.player-header {
    height:50px;
    display:flex;
    align-items:center;
    padding:0 10px;
    background:#02040a;
    border-bottom:1px solid var(--border);
}

.player-btn {
    color:#38bdf8;
    border:none;
    background:none;
}

.player-title {
    flex:1;
    text-align:center;
}

.loader {
    text-align:center;
    padding:80px;
    color:#94a3b8;
}

.loader i {
    font-size:40px;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    to { transform:rotate(360deg); }
}

/* ✅ ONLY ADDITION */
.floating-back {
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;
    background:rgba(0,0,0,0.6);
    border:none;
    color:white;
    font-size:18px;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<header><h1>CRICKCAST LIVE</h1></header>
<main class="grid" id="g"></main>

<nav>
<button class="nav-btn active" onclick="f('all',this)"><i class="fas fa-grid"></i><br>All</button>
<button class="nav-btn" onclick="f('Cricket',this)"><i class="fas fa-baseball"></i><br>Cricket</button>
<button class="nav-btn" onclick="f('Football',this)"><i class="fas fa-futbol"></i><br>Football</button>
<button class="nav-btn" onclick="f('Tennis',this)"><i class="fas fa-table-tennis"></i><br>Tennis</button>
</nav>

<div id="qm" class="modal">
<div class="modal-box">
<h2>Select Quality</h2>
<div id="ql"></div>
<button onclick="cm()">Cancel</button>
</div>
</div>

<div class="player" id="p">
<div class="player-header">
<button class="player-btn" onclick="cp()"><i class="fas fa-arrow-left"></i></button>
<div class="player-title" id="pt">Playing...</div>
</div>

<div class="player-video" style="position:relative;">

<!-- ✅ ONLY ADDED -->
<button class="floating-back" onclick="cp()">
<i class="fas fa-arrow-left"></i>
</button>

<video id="v" autoplay playsinline></video>

</div>
</div>

<!-- 🔒 REST JS SAME -->
<script>
/* YOUR ORIGINAL JS COMPLETELY SAME */
</script>

</body>
</html>
