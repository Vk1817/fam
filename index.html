<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CRICKCAST LIVE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,600;0,700;0,800;1,700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<meta name="referrer" content="no-referrer">

<style>
:root {
  --bg: #050810;
  --surface: #0b0f1a;
  --surface2: #111827;
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.15);
  --accent: #f59e0b;
  --accent2: #ef4444;
  --accent3: #06b6d4;
  --text: #f1f5f9;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
  --live-red: #ef4444;
  --upcoming-blue: #3b82f6;
  --ended-gray: #475569;
  --card-radius: 12px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --font-cond: 'Barlow Condensed', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  padding-top: 72px;
  padding-bottom: 85px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Ambient bg */
body::before {
  content:'';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(245,158,11,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 90% 100%, rgba(6,182,212,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(239,68,68,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 66px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: rgba(5,8,16,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  z-index: 1000;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), #dc7700);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: #000;
  font-weight: 900;
  flex-shrink: 0;
}

.logo-text {
  font-family: var(--font-display);
  font-size: 26px;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 40%, #e2e8f0 70%, #38bdf8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 20px;
  padding: 4px 10px;
  font-family: var(--font-cond);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #fca5a5;
}

.header-live-badge::before {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--live-red);
  animation: blink 1.2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

/* ── NAV ── */
nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 72px;
  display: flex;
  background: rgba(5,8,16,0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  z-index: 1000;
}

.nav-btn {
  flex: 1;
  border: none;
  background: none;
  color: var(--text-muted);
  font-size: 10px;
  font-family: var(--font-cond);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  position: relative;
  transition: color 0.2s;
}

.nav-btn i { font-size: 18px; }

.nav-btn.active {
  color: var(--accent);
}

.nav-btn.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 20%;
  right: 20%;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  border-radius: 0 0 4px 4px;
}

.nav-btn:hover:not(.active) { color: var(--text-dim); }

/* ── GRID ── */
.grid-wrapper {
  padding: 18px;
  max-width: 1400px;
  margin: auto;
  position: relative;
  z-index: 1;
}

.section-label {
  font-family: var(--font-cond);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-left: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 16px;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--card-radius);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease, border-color 0.25s ease;
  animation: cardIn 0.4s ease both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card:hover {
  transform: translateY(-5px) scale(1.015);
  border-color: rgba(245,158,11,0.35);
  box-shadow:
    0 18px 40px rgba(0,0,0,0.6),
    0 0 0 1px rgba(245,158,11,0.15),
    0 0 30px rgba(245,158,11,0.08);
}

.card-thumb {
  position: relative;
  height: 158px;
  overflow: hidden;
}

.card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}

.card:hover .card-thumb img {
  transform: scale(1.06);
}

/* Gradient overlay on image */
.card-thumb::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.1) 0%,
    transparent 40%,
    rgba(5,8,16,0.7) 100%
  );
}

/* Sport type strip */
.card-sport-strip {
  position: absolute;
  top: 0;
  right: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  padding: 5px 10px;
  font-family: var(--font-cond);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  text-transform: uppercase;
  border-bottom-left-radius: 8px;
  z-index: 2;
}

/* Badge */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  font-family: var(--font-cond);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
  z-index: 3;
  display: flex;
  align-items: center;
  gap: 5px;
}

.badge-live {
  background: var(--live-red);
  color: white;
  box-shadow: 0 0 12px rgba(239,68,68,0.5);
}

.badge-live::before {
  content:'';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: white;
  animation: blink 1s infinite;
}

.badge-up {
  background: linear-gradient(135deg, #2563eb, #4f46e5);
  color: white;
}

.badge-ended {
  background: rgba(71,85,105,0.8);
  color: #94a3b8;
}

/* Play overlay */
.card-play-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 2;
}

.card-play-overlay .play-circle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: rgba(245,158,11,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #000;
  transform: scale(0.8);
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 0 30px rgba(245,158,11,0.5);
}

.card:hover .card-play-overlay { opacity: 1; }
.card:hover .card-play-overlay .play-circle { transform: scale(1); }

/* Card body */
.card-info {
  padding: 14px 16px;
  background: linear-gradient(180deg, var(--surface) 0%, var(--surface2) 100%);
}

.card-title {
  font-family: var(--font-cond);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 6px;
  letter-spacing: 0.2px;
}

.card-meta {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}

.card-meta i { font-size: 10px; color: var(--accent); }

.card-time {
  font-size: 11px;
  color: var(--text-dim);
  padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-time-label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-cond);
  font-weight: 600;
  letter-spacing: 0.5px;
}

.card-time-label i { color: var(--accent3); font-size: 10px; }

/* ── LOADER ── */
.loader {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.loader-spinner {
  width: 44px;
  height: 44px;
  border: 3px solid rgba(245,158,11,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.loader p {
  font-family: var(--font-cond);
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ── QUALITY MODAL ── */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(16px);
  justify-content: center;
  align-items: flex-end;
  z-index: 2000;
  padding: 20px;
}

.modal.active { display: flex; }

.modal-box {
  background: var(--surface2);
  border: 1px solid var(--border-bright);
  border-radius: 20px 20px 16px 16px;
  padding: 24px;
  width: 100%;
  max-width: 420px;
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

.modal-title {
  font-family: var(--font-cond);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 16px;
  text-align: center;
}

#ql { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }

#ql button {
  width: 100%;
  padding: 13px 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-family: var(--font-cond);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.15s;
}

#ql button:hover {
  background: rgba(245,158,11,0.12);
  border-color: rgba(245,158,11,0.4);
  color: var(--accent);
}

#ql button::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.modal-cancel {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-cond);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}

.modal-cancel:hover { background: rgba(255,255,255,0.05); color: var(--text); }

/* ── PLAYER ── */
.player {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  flex-direction: column;
  z-index: 3000;
}

.player.active { display: flex; }

.player-header {
  height: 54px;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 12px;
  background: rgba(5,8,16,0.9);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.player-back-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.06);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.15s;
  flex-shrink: 0;
}

.player-back-btn:hover {
  background: rgba(245,158,11,0.15);
  border-color: rgba(245,158,11,0.4);
  color: var(--accent);
}

.player-title {
  flex: 1;
  font-family: var(--font-cond);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-live-dot {
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-cond);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: #fca5a5;
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  padding: 4px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

.player-live-dot::before {
  content:'';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--live-red);
  animation: blink 1s infinite;
}

.player-video-wrap {
  flex: 1;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#v {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* Floating back button inside video */
.floating-back {
  position: absolute;
  top: 14px;
  left: 14px;
  z-index: 9999;
  background: rgba(5,8,16,0.7);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  font-size: 15px;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
}

.floating-back:hover {
  background: rgba(245,158,11,0.2);
  border-color: var(--accent);
  color: var(--accent);
}

/* Empty state */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-family: var(--font-cond);
  letter-spacing: 1px;
}

.empty-state i {
  font-size: 40px;
  margin-bottom: 12px;
  display: block;
  opacity: 0.4;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="header-logo">
    <div class="logo-icon"><i class="fas fa-satellite-dish"></i></div>
    <span class="logo-text">CRICKCAST LIVE</span>
  </div>
  <div class="header-live-badge">LIVE</div>
</header>

<!-- MAIN GRID -->
<div class="grid-wrapper">
  <div class="section-label">Live &amp; Upcoming Matches</div>
  <main class="grid" id="g"></main>
</div>

<!-- BOTTOM NAV -->
<nav>
  <button class="nav-btn active" onclick="f('all',this)">
    <i class="fas fa-border-all"></i>All
  </button>
  <button class="nav-btn" onclick="f('Cricket',this)">
    <i class="fas fa-baseball-bat-ball"></i>Cricket
  </button>
  <button class="nav-btn" onclick="f('Football',this)">
    <i class="fas fa-futbol"></i>Football
  </button>
  <button class="nav-btn" onclick="f('Tennis',this)">
    <i class="fas fa-table-tennis-paddle-ball"></i>Tennis
  </button>
</nav>

<!-- QUALITY MODAL -->
<div id="qm" class="modal">
  <div class="modal-box">
    <div class="modal-title">Select Stream Quality</div>
    <div id="ql"></div>
    <button class="modal-cancel" onclick="cm()">Cancel</button>
  </div>
</div>

<!-- PLAYER -->
<div class="player" id="p">
  <div class="player-header">
    <button class="player-back-btn" onclick="cp()">
      <i class="fas fa-arrow-left"></i>
    </button>
    <div class="player-title" id="pt">Playing...</div>
    <div class="player-live-dot">LIVE</div>
  </div>

  <div class="player-video-wrap">
    <!-- Floating back button inside video area -->
    <button class="floating-back" onclick="cp()">
      <i class="fas fa-arrow-left"></i>
    </button>
    <video id="v" autoplay playsinline></video>
  </div>
</div>

<!-- ══════════════════════════════════════════
     ALL ORIGINAL LOGIC — COMPLETELY UNCHANGED
     ══════════════════════════════════════════ -->
<script>
/* KEEP YOUR ORIGINAL JS HERE EXACTLY (NO CHANGE) */

  
const AP="https://a7.akcoder777.workers.dev/fc";
let M=[],ft='all',pi=0;

function pd(s){
  try{
    const p=s.replace(/\s+/g,' ').trim().split(' ');
    const m={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
    let h=parseInt(p[3])||0,min=parseInt(p[4])||0;
    if(p[5]==='PM'&&h!==12)h+=12;
    if(p[5]==='AM'&&h===12)h=0;
    return new Date(p[2],m[p[1]],p[0],h,min).getTime();
  }catch(e){return Date.now()+3600000;}
}

function fd(ts){
  if(!ts)return 'TBA';
  const d=new Date(ts);
  if(d.toString()==='Invalid Date')return 'TBA';
  const opt={month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'};
  return d.toLocaleString('en-US',opt);
}

function nm(d){
  let a=[];
  (d.matches||[]).forEach(m=>{
    let r={};
    if(m.all_resolutions)
      Object.keys(m.all_resolutions).forEach(x=>{
        if(m.all_resolutions[x]?.includes('.m3u8'))
          r[x]=m.all_resolutions[x];
      });

    const isLive=['live','LIVE','started','STARTED'].includes(m.type||m.status);

    a.push({
      id:m.match_id||Math.random(),
      t:m.match,
      tr:m.tournament,
      c:m.category,
      l:m.language,
      img:m.image,
      li:isLive,
      en:!isLive,
      u:m.stream_url||r['1080p']||r['720p']||'',
      r:r,
      tm:pd(m.startTime)
    });
  });

  (d.upcoming_matches||[]).forEach(m=>{
    a.push({
      id:m.match_id||Math.random(),
      t:m.match,
      tr:m.tournament,
      c:m.category,
      l:m.language,
      img:m.image,
      li:false,
      en:false,
      u:'',
      r:{},
      tm:pd(m.startTime)
    });
  });

  return a.sort((a,b)=>(b.li?1:0)-(a.li?1:0)||a.tm-b.tm);
}

function rn(){
  const f=ft==='all'?M:M.filter(m=>m.c?.toLowerCase()===ft.toLowerCase());

  document.getElementById('g').innerHTML=!f.length
  ? `<div class="empty-state"><i class="fas fa-inbox"></i>No matches available</div>`
  : f.map(m=>{
    const badgeText=m.li?'LIVE':m.en?'ENDED':'UPCOMING';
    const badgeClass=m.li?'badge-live':m.en?'badge-ended':'badge-up';

    return `
    <div class="card" onclick="pl(${M.indexOf(m)})">
      <div class="card-thumb">
        <img src="${m.img||'https://via.placeholder.com/300x180'}">

        <div class="card-sport-strip">${m.c||'SPORT'}</div>

        <div class="badge ${badgeClass}">${badgeText}</div>

        <div class="card-play-overlay">
          <div class="play-circle">
            <i class="fas fa-play"></i>
          </div>
        </div>
      </div>

      <div class="card-info">
        <div class="card-title">${m.t}</div>

        <div class="card-meta">
          <i class="fas fa-trophy"></i>${m.tr||'Tournament'}
        </div>

        <div class="card-time">
          <span class="card-time-label">
            <i class="fas fa-clock"></i>${fd(m.tm)}
          </span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function pl(i){
  if(M[i].en){alert('Match Ended');return;}
  if(!M[i].li){alert('Starts: '+fd(M[i].tm));return;}

  if(Object.keys(M[i].r).length>1) sq(i);
  else if(M[i].u) ps(M[i],M[i].u);
  else alert('No stream');
}

function sq(i){
  const rs=Object.keys(M[i].r).sort((a,b)=>parseInt(b)-parseInt(a));

  document.getElementById('ql').innerHTML=rs.map(r=>
    `<button onclick="ps(M[${i}],M[${i}].r['${r}']);cm()">${r}</button>`
  ).join('');

  document.getElementById('qm').classList.add('active');
}

async function ps(m,u){
  if(!u)return;

  document.getElementById('pt').innerText=m.t;
  document.getElementById('p').classList.add('active');

  const v=document.getElementById('v');
  v.currentTime=0;

  try{
    if(!pi){
      window.player=new Plyr('#v');
      pi=1;
    }

    v.src=u;
    v.type='application/x-mpegURL';
    await v.load();

    setTimeout(()=>{
      v.play().catch(()=>{
        v.muted=true;
        v.play();
      });
    },100);

  }catch(e){
    v.src=u;
    v.type='application/x-mpegURL';
    v.play().catch(()=>{
      v.muted=true;
      v.play();
    });
  }
}

function f(t,b){
  ft=t;
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  rn();
}

function cm(){
  document.getElementById('qm').classList.remove('active');
}

function cp(){
  document.getElementById('p').classList.remove('active');

  const v=document.getElementById('v');
  v.pause();
  v.currentTime=0;
  v.src='';

  if(window.player){
    try{window.player.destroy();}catch(e){}
    pi=0;
  }
}

async function ld(){
  try{
    const r=await fetch(AP);
    const d=await r.json();
    M=nm(d);
    rn();
  }catch(e){
    document.getElementById('g').innerHTML='Load Error';
  }
}

ld();

</script>
