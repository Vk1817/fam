<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FanCode Live Streaming | Watch Free</title>
<link rel="icon" href="https://fancode.com/favicon.ico" type="image/x-icon">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

</head>

<body class="text-slate-200">

<!-- ALL YOUR ORIGINAL HTML CONTENT REMAINS EXACTLY SAME -->

<script>

const spotlightContainer = document.getElementById('spotlight-container');
const gridContainer = document.getElementById('matches-grid');

const DATA_URL =
'https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json';

const PLAY_BASE = 'fc/player.html';


async function fetchAndRender() {

try {

/* ONLY CHANGE APPLIED HERE */
const res =
await fetch(DATA_URL + "?v=" + Date.now());

const data =
await res.json();

let matches =
Array.isArray(data.matches) ? data.matches : [];

matches.sort((a,b)=>{

const aIsLive =
a.status?.toUpperCase()==='LIVE';

const bIsLive =
b.status?.toUpperCase()==='LIVE';

return bIsLive-aIsLive;

});

const liveCount =
matches.filter(m=>m.status?.toUpperCase()==='LIVE').length;

const upcomingCount =
matches.filter(m=>m.status?.toUpperCase()!=='LIVE').length;

document.getElementById('live-count').textContent =
liveCount;

document.getElementById('total-count').textContent =
matches.length;

document.getElementById('upcoming-count').textContent =
upcomingCount;

gridContainer.innerHTML='';

const firstLiveMatch =
matches.find(m=>m.status?.toUpperCase()==='LIVE');

if(firstLiveMatch){

renderSpotlight(firstLiveMatch);

matches =
matches.filter(m=>m.match_id!==firstLiveMatch.match_id);

}

allMatches = matches;

filterMatches('',currentFilter);

if(liveCount>0){

showToast(`🔴 ${liveCount} match${liveCount>1?'es':''} live now!`);

}

}catch(error){

console.error("Failed to load match data:",error);

gridContainer.innerHTML =
`<p class="col-span-full text-center text-red-400">Could not load matches. Please check your connection and try again.</p>`;

}

}

</script>

</body>
</html>
