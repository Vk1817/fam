<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AkCoder Live Matches</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ff5500;
        }
        
        /* Video Player Styles */
        #player-wrapper {
            display: none;
            max-width: 850px;
            margin: 0 auto 30px auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #now-playing {
            padding: 15px;
            background: #1e1e1e;
            margin: 0;
            font-size: 1.2em;
            text-align: center;
            border-bottom: 2px solid #ff5500;
        }
        
        /* Default Grid Styles (Vertical) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        
        /* Horizontal Scroll Styles (Activated when playing) */
        .grid.horizontal-mode {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 15px; /* Space for scrollbar */
            scroll-behavior: smooth;
        }
        .grid.horizontal-mode::-webkit-scrollbar {
            height: 8px;
        }
        .grid.horizontal-mode::-webkit-scrollbar-thumb {
            background: #ff5500;
            border-radius: 4px;
        }
        .grid.horizontal-mode .card {
            flex: 0 0 280px; /* Fixed width for horizontal cards */
        }

        /* Card Styles */
        .card {
            background: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            user-select: none; /* Prevents text selection during long press */
            -webkit-user-select: none;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(255, 85, 0, 0.3);
        }
        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            pointer-events: none; /* Prevents image drag conflicts */
        }
        .card-content {
            padding: 15px;
            pointer-events: none;
        }
        .status {
            display: inline-block;
            background: red;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .title {
            font-size: 1.1em;
            font-weight: bold;
            margin: 0 0 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tournament {
            color: #aaaaaa;
            font-size: 0.9em;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #4CAF50;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }
        #toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>

    <h1>AkCoder Sports Live</h1>

    <div id="player-wrapper">
        <p id="now-playing"></p>
        <video id="video" controls crossorigin playsinline></video>
    </div>

    <div class="grid" id="matches-grid">
        <p style="text-align: center; grid-column: 1 / -1;">Loading matches...</p>
    </div>

    <div id="toast">Source URL Copied!</div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        const WORKER_URL = "https://fancod.akcoder777.workers.dev/";
        let player = null;
        let hls = null;

        // Fetch data from Worker
        async function fetchMatches() {
            const grid = document.getElementById('matches-grid');
            try {
                const response = await fetch(WORKER_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                const uniqueMatches = deduplicateMatches(data.matches);
                renderMatches(uniqueMatches);
            } catch (error) {
                grid.innerHTML = `<p style="color: #ff4444; text-align: center;">Failed to load matches. Ensure your Worker is active.</p>`;
                console.error("Error:", error);
            }
        }

        // Deduplication Logic
        function deduplicateMatches(matchesList) {
            if (!matchesList) return [];
            const seenIds = new Set();
            return matchesList.filter(match => {
                if (seenIds.has(match.match_id)) return false;
                seenIds.add(match.match_id);
                return true;
            });
        }

        // Extract Highest Quality URL from Playlist Text
        function extractStreamUrl(playlistText) {
            const urlRegex = /https:\/\/[^\s]+/g;
            const urls = playlistText.match(urlRegex);
            return urls && urls.length > 0 ? urls[urls.length - 1] : null; // Grabs the last URL (usually 1080p)
        }

        // Show Toast Notification
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 3000);
        }

        // Render matches to DOM
        function renderMatches(matches) {
            const grid = document.getElementById('matches-grid');
            grid.innerHTML = "";

            if (matches.length === 0) {
                grid.innerHTML = `<p style="text-align: center; grid-column: 1 / -1;">No matches available.</p>`;
                return;
            }

            matches.forEach(match => {
                if (!match.auto_streams || match.auto_streams.length === 0) return;

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${match.image}" alt="${match.title}" loading="lazy">
                    <div class="card-content">
                        ${match.status === 'LIVE' ? '<span class="status">LIVE</span>' : ''}
                        <h3 class="title">${match.title}</h3>
                        <p class="tournament">${match.tournament}</p>
                    </div>
                `;

                // Long Press Logic Variables
                let pressTimer;
                let isLongPress = false;

                const startPress = (e) => {
                    isLongPress = false;
                    pressTimer = setTimeout(() => {
                        isLongPress = true;
                        const rawText = match.auto_streams[0].auto;
                        const extractedUrl = extractStreamUrl(rawText);
                        
                        if (extractedUrl) {
                            navigator.clipboard.writeText(extractedUrl).then(() => {
                                showToast("Source URL Copied to Clipboard!");
                            }).catch(err => {
                                console.error('Failed to copy text: ', err);
                                showToast("Failed to copy URL");
                            });
                        } else {
                            showToast("No valid URL found to copy");
                        }
                    }, 5000); // 5 seconds hold
                };

                const cancelPress = () => {
                    clearTimeout(pressTimer);
                };

                // Desktop Events
                card.addEventListener('mousedown', startPress);
                card.addEventListener('mouseup', cancelPress);
                card.addEventListener('mouseleave', cancelPress);
                
                // Mobile Touch Events
                card.addEventListener('touchstart', startPress, {passive: true});
                card.addEventListener('touchend', cancelPress);
                card.addEventListener('touchcancel', cancelPress);

                // Play Stream on Click (Only if it wasn't a 5-sec hold)
                card.addEventListener('click', () => {
                    if (isLongPress) return; // Prevent playing if the user was just holding to copy
                    
                    const rawPlaylist = match.auto_streams[0].auto;
                    playStream(rawPlaylist, match.title);
                    
                    // Switch grid to horizontal mode
                    document.getElementById('matches-grid').classList.add('horizontal-mode');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });

                grid.appendChild(card);
            });
        }

        // Play video with Quality Selection
        function playStream(m3u8Text, title) {
            const video = document.getElementById('video');
            document.getElementById('player-wrapper').style.display = 'block';
            document.getElementById('now-playing').innerText = `Playing: ${title}`;

            if (hls) { hls.destroy(); }
            if (player) { player.destroy(); }

            const blob = new Blob([m3u8Text], { type: 'application/vnd.apple.mpegurl' });
            const blobUrl = URL.createObjectURL(blob);

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(blobUrl);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    const availableQualities = hls.levels.map(l => l.height);
                    availableQualities.unshift(0); 

                    player = new Plyr(video, {
                        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
                        settings: ['quality'],
                        quality: {
                            default: 0,
                            options: availableQualities,
                            forced: true,
                            onChange: (newQuality) => {
                                if (newQuality === 0) {
                                    hls.currentLevel = -1;
                                } else {
                                    hls.levels.forEach((level, index) => {
                                        if (level.height === newQuality) {
                                            hls.currentLevel = index;
                                        }
                                    });
                                }
                            }
                        },
                        i18n: { qualityLabel: { 0: 'Auto' } }
                    });

                    player.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = blobUrl;
                player = new Plyr(video);
                video.addEventListener('loadedmetadata', () => player.play());
            }
        }

        fetchMatches();
    </script>
</body>
</html>
