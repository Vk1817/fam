<svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="50%" stop-color="#ffb703"/>
      <stop offset="100%" stop-color="#e08e00"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#171b28"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <linearGradient id="playFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe9b0"/>
      <stop offset="100%" stop-color="#ffb703"/>
    </linearGradient>
  </defs>

  <!-- hex-ish rounded outer ring for a more distinct silhouette than a plain circle -->
  <circle cx="70" cy="70" r="66" fill="url(#core)" stroke="url(#ring)" stroke-width="3"/>
  <circle cx="70" cy="70" r="57" fill="none" stroke="#ffb703" stroke-width="0.8" opacity="0.35"/>

  <!-- seam arcs, cricket-ball nod -->
  <path d="M20,48 Q70,74 120,48" fill="none" stroke="#ffb703" stroke-width="2" opacity="0.5"/>
  <path d="M20,92 Q70,66 120,92" fill="none" stroke="#ffb703" stroke-width="2" opacity="0.5"/>

  <!-- play triangle, slightly rounded feel via stroke join -->
  <polygon points="58,44 58,96 104,70" fill="url(#playFill)" stroke-linejoin="round"/>

  <!-- live dot -->
  <circle cx="104" cy="36" r="6.5" fill="#ff3b3b"/>
  <circle cx="104" cy="36" r="11" fill="none" stroke="#ff3b3b" stroke-width="1.4" opacity="0.55"/>
</svg>
