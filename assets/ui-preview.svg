  <circle cx="24" cy="59" r="3.5" fill="#ff3b3b"/>
  <text x="36" y="63" class="mono">LIVE — INDIA vs AUSTRALIA, 3RD T20I &#8226; LIVE — MI vs CSK, IPL 2026 &#8226; LIVE — ENG vs NZ, TEST</text>

