  <rect width="1200" height="620" fill="url(#pbg)"/>

  <!-- ── browser chrome frame ── -->
  <rect x="0" y="0" width="1200" height="44" fill="#0c0f18" stroke="#1c2130" stroke-width="1"/>
  <circle cx="26" cy="22" r="6.5" fill="#ff5f57"/>
  <circle cx="48" cy="22" r="6.5" fill="#febc2e"/>
  <circle cx="70" cy="22" r="6.5" fill="#28c840"/>
  <rect x="420" y="10" width="360" height="24" rx="12" fill="#161a26" stroke="#262b3c"/>
