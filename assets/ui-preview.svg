    <rect x="186" y="214" width="122" height="28" rx="9" class="chip"/>
    <text x="197" y="232" class="t2">CHENNAI</text>
    <rect x="22" y="282" width="286" height="42" rx="13" fill="#171c29" stroke="#2a2f42"/>
    <text x="165" y="308" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="13.5" fill="#5c6478">&#9203; UPCOMING</text>
