    <style>
      .card{ fill:#10131d; stroke:#262b3c; stroke-width:1; }
      .cardHot{ fill:#12141f; stroke:#ffb703; stroke-width:1.4; }
      .t1{ font-family:'Segoe UI', Arial, sans-serif; font-weight:700; font-size:16px; fill:#eef1f8; }
      .t2{ font-family:'Segoe UI', Arial, sans-serif; font-size:11.5px; fill:#8c93a8; }
      .mono{ font-family:'Courier New', monospace; font-size:10px; fill:#8c93a8; }
      .chip{ fill:#171c29; stroke:#2a2f42; stroke-width:1; }
    </style>
