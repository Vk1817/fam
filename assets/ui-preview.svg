  <text x="600" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="36" letter-spacing="5" fill="#ffb703">CRICKCAST</text>
  <text x="600" y="163" text-anchor="middle" class="mono" letter-spacing="4">LIVE SPORTS &#8226; ZERO BUFFER</text>

  <!-- ── three match cards ── -->
