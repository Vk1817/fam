    <rect x="18" y="18" width="58" height="22" rx="11" fill="#2a0f0f" stroke="#ff3b3b"/>
    <circle cx="29" cy="29" r="3" fill="#ff3b3b"/>
    <text x="38" y="33" font-family="'Courier New', monospace" font-size="9" fill="#ff8a8a">LIVE</text>
