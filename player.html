<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FanCode Player | Live Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<style>
body{
background:#000;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
font-family:sans-serif;
}
video{
width:100%;
max-width:1100px;
}
</style>
</head>

<body>

<video id="player" controls playsinline></video>

<script>

const DATA_URL = "https://cdn.jsdelivr.net/gh/Jitendra-unatti/fancode@main/data/fancode.json";
const video = document.getElementById("player");

let hls;
let player;

function getParam(name){
const url = new URL(window.location.href);
return url.searchParams.get(name);
}

async function startPlayer(){

const direct = getParam("direct");
const id = getParam("id");
const cdn = getParam("cdn");

let streamUrl = null;

if(direct){

streamUrl = decodeURIComponent(direct);

}else if(id && cdn){

const res = await fetch(DATA_URL);
const data = await res.json();

const match = data.matches.find(m => String(m.match_id) === String(id));

if(match){

const sources = {
...match.STREAMING_CDN,
adfree_stream: match.adfree_stream,
dai_stream: match.dai_stream
};

streamUrl = sources[cdn];

}

}

if(!streamUrl){
document.body.innerHTML="<h2>Stream unavailable</h2>";
return;
}

playStream(streamUrl);

}

function playStream(url){

if(Hls.isSupported()){

hls = new Hls({
enableWorker:true,
lowLatencyMode:true
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

player = new Plyr(video,{
controls:[
'play-large',
'play',
'progress',
'current-time',
'mute',
'volume',
'settings',
'fullscreen'
]
});

player.play();

});

}else if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src=url;

player=new Plyr(video);

video.addEventListener("loadedmetadata",()=>{
player.play();
});

}

}

startPlayer();

</script>

</body>
</html>
