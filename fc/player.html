<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FanCode Player | Live Streaming</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" href="https://fancode.com/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>
/* --- YOUR ORIGINAL CSS UNCHANGED --- */
:root {
--plyr-color-main:#0ea5e9;
--background-dark:#02040a;
--border-color:rgba(255,255,255,0.1);
--accent-purple:#a855f7;
}
</style>

</head>

<body class="text-slate-200">

<header class="player-header text-center">
<h1 id="match-title">Loading Match...</h1>
</header>

<main class="player-main">

<div class="loading-overlay" id="loading-overlay">
<div class="spinner"></div>
</div>

<video id="player" playsinline controls></video>

</main>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>

const DATA_URL =
'https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json';

const playerElement =
document.getElementById('player');

const matchTitleElem =
document.getElementById('match-title');


async function getStreamAndMatchDetails(id,cdnKey){

try{

/* FIX 1: prevent cached JSON */
const res =
await fetch(DATA_URL + "?v=" + Date.now());

const data =
await res.json();

const match =
data.matches.find(m => String(m.match_id) === String(id));

if(!match) throw new Error("Match not found");

const streamingCdn =
{...match.STREAMING_CDN};

delete streamingCdn.Primary_Playback_URL;

const sources={
adfree_stream:match.adfree_stream,
dai_stream:match.dai_stream,
...streamingCdn
};

const streamUrl =
sources[cdnKey];

if(streamUrl && streamUrl!=="Unavailable"){
return {streamUrl,match};
}

throw new Error("Stream unavailable");

}catch(e){

console.error(e);

return {streamUrl:null,match:null};

}

}



document.addEventListener("DOMContentLoaded",async()=>{

const urlParams=
new URLSearchParams(window.location.search);

const id=urlParams.get("id");

const cdn=urlParams.get("cdn");

if(!id || !cdn){
return;
}

const {streamUrl,match}=
await getStreamAndMatchDetails(id,cdn);

if(!streamUrl){
return;
}

if(match){
matchTitleElem.textContent=
match.title || "Live Match";
}



const loadingOverlay =
document.getElementById("loading-overlay");


if(streamUrl.includes(".m3u8") && Hls.isSupported()){

const hls =
new Hls();

hls.loadSource(streamUrl);

hls.attachMedia(playerElement);


/* FIX 2: HLS stream recovery */

hls.on(Hls.Events.ERROR,function(event,data){

if(data.fatal){

switch(data.type){

case Hls.ErrorTypes.NETWORK_ERROR:

console.log("Network error... retry");

hls.startLoad();

break;

case Hls.ErrorTypes.MEDIA_ERROR:

console.log("Media error... recover");

hls.recoverMediaError();

break;

default:

console.log("Fatal error reload");

location.reload();

break;

}

}

});


hls.on(Hls.Events.MANIFEST_PARSED,function(){

loadingOverlay.classList.add("hidden");

const player =
new Plyr(playerElement,{
autoplay:true
});

player.play().catch(()=>{});

});

}else{

loadingOverlay.classList.add("hidden");

playerElement.src=
streamUrl;

const player =
new Plyr(playerElement,{
autoplay:true
});

player.play().catch(()=>{});

}

});

</script>

</body>
</html>
