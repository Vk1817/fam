<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FanCode Player | Live Streaming</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="referrer" content="no-referrer"/>

<link rel="icon" href="https://fancode.com/favicon.ico">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
background:#02040a;
color:white;
font-family:Inter;
height:100vh;
display:flex;
flex-direction:column;
}
.player-main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:black;
}
</style>

</head>

<body>

<header class="text-center p-4">
<h1 id="match-title">Loading Match...</h1>
</header>

<main class="player-main">
<video id="player" controls playsinline></video>
</main>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>

const DATA_URL =
"https://raw.githubusercontent.com/Jitendra-unatti/fancode/refs/heads/main/data/fancode.json";

const playerElement =
document.getElementById("player");

const matchTitleElem =
document.getElementById("match-title");


async function getStreamAndMatchDetails(id,cdnKey){

try{

// FIXED (prevents cached JSON)
const res =
await fetch(DATA_URL + "?v=" + Date.now());

const data =
await res.json();

const match =
data.matches.find(m => String(m.match_id) === String(id));

if(!match) return {streamUrl:null,match:null};

const streamingCdn={
...match.STREAMING_CDN
};

delete streamingCdn.Primary_Playback_URL;

const sources={
adfree_stream:match.adfree_stream,
dai_stream:match.dai_stream,
...streamingCdn
};

const streamUrl=sources[cdnKey];

return {streamUrl,match};

}catch(e){

console.log(e);

return {streamUrl:null,match:null};

}

}


function displayError(message){

document.body.innerHTML=
`<div style="text-align:center;padding:40px">
<h2>Stream Error</h2>
<p>${message}</p>
<a href="index.html">Go Back</a>
</div>`;

}


document.addEventListener("DOMContentLoaded",async()=>{

const urlParams=
new URLSearchParams(window.location.search);

const id=urlParams.get("id");

const cdn=urlParams.get("cdn");

if(!id || !cdn){

displayError("Invalid stream link");

return;

}

const {streamUrl,match} =
await getStreamAndMatchDetails(id,cdn);

if(!streamUrl){

displayError("Stream unavailable");

return;

}

if(match){

matchTitleElem.textContent=
match.title || "Live Match";

}


if(streamUrl.includes(".m3u8") && Hls.isSupported()){

const hls =
new Hls({
maxBufferLength:30,
maxMaxBufferLength:60
});

hls.loadSource(streamUrl);

hls.attachMedia(playerElement);


// FIXED (stream loading recovery)

hls.on(Hls.Events.ERROR,function(event,data){

if(data.fatal){

switch(data.type){

case Hls.ErrorTypes.NETWORK_ERROR:

console.log("Network error recovery");

hls.startLoad();

break;

case Hls.ErrorTypes.MEDIA_ERROR:

console.log("Media error recovery");

hls.recoverMediaError();

break;

default:

console.log("Fatal error reload");

location.reload();

break;

}

}

});


hls.on(Hls.Events.MANIFEST_PARSED,function(){

const player =
new Plyr(playerElement,{
autoplay:true
});

player.play().catch(()=>{});

});


}else{

playerElement.src=streamUrl;

const player =
new Plyr(playerElement,{
autoplay:true
});

player.play().catch(()=>{});

}

});

</script>

</body>
</html>
