<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>CRICKCAST LIVE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<meta name="referrer" content="no-referrer">

<style>
/* 🔒 SAME CSS (UNCHANGED) */
:root {
    --bg: #02040a;
    --card: rgba(15, 23, 42, 0.6);
    --border: rgba(255,255,255,0.1);
    --glow1: #0ea5e9;
    --glow2: #a855f7;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: #e2e8f0;
    padding-top: 70px;
    padding-bottom: 80px;
    background-image:
        radial-gradient(circle at 20% 20%, rgba(14,165,233,0.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(168,85,247,0.15), transparent 40%);
}

header {
    position: fixed;
    top:0;
    width:100%;
    height:65px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: rgba(2,4,10,0.7);
    backdrop-filter: blur(12px);
    border-bottom:1px solid var(--border);
    z-index:1000;
}

header h1 {
    font-size:22px;
    font-weight:900;
    background: linear-gradient(135deg, #38bdf8, #a855f7, #f59e0b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:18px;
    padding:18px;
    max-width:1400px;
    margin:auto;
}

.card {
    background: var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    backdrop-filter: blur(16px);
    transition:0.3s;
    position:relative;
}

.card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: var(--glow1);
    box-shadow:0 20px 40px rgba(0,0,0,0.6),
               0 0 25px rgba(14,165,233,0.3);
}

.card img {
    width:100%;
    height:150px;
    object-fit:cover;
}

.badge {
    position:absolute;
    top:10px;
    left:10px;
    font-size:10px;
    padding:5px 10px;
    border-radius:20px;
    font-weight:700;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    animation:pulse 2s infinite;
}

.badge-up { background:linear-gradient(135deg,#3b82f6,#6366f1); }
.badge-ended { background:#6b7280; }

@keyframes pulse {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.05); }
}

.card-info {
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.card-title {
    font-size:14px;
    font-weight:700;
    color:white;
}

.card-meta {
    font-size:11px;
    color:#94a3b8;
}

.card-time {
    margin-top:auto;
    font-size:11px;
    padding-top:6px;
    border-top:1px solid var(--border);
}

nav {
    position:fixed;
    bottom:0;
    width:100%;
    height:75px;
    display:flex;
    background: rgba(2,4,10,0.9);
    backdrop-filter: blur(12px);
    border-top:1px solid var(--border);
}

.nav-btn {
    flex:1;
    border:none;
    background:none;
    color:#64748b;
    font-size:11px;
}

.nav-btn.active {
    color:#38bdf8;
}

.nav-btn:hover {
    color:white;
}

.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    justify-content:center;
    align-items:center;
}

.modal.active { display:flex; }

.modal-box {
    background: var(--card);
    border:1px solid var(--border);
    padding:20px;
    border-radius:14px;
}

.modal-box button {
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#0ea5e9,#06b6d4);
    color:black;
    font-weight:600;
}

.player {
    display:none;
    position:fixed;
    inset:0;
    background:black;
    flex-direction:column;
}

.player.active { display:flex; }

.player-header {
    height:50px;
    display:flex;
    align-items:center;
    padding:0 10px;
    background:#02040a;
    border-bottom:1px solid var(--border);
}

.player-btn {
    color:#38bdf8;
    border:none;
    background:none;
}

.player-title {
    flex:1;
    text-align:center;
}

.loader {
    text-align:center;
    padding:80px;
    color:#94a3b8;
}

.loader i {
    font-size:40px;
    animation:spin 1s linear infinite;
}

@keyframes spin {
    to { transform:rotate(360deg); }
}
</style>
</head>

<body>

<header><h1>CRICKCAST LIVE</h1></header>
<main class="grid" id="g"></main>

<nav>
<button class="nav-btn active" onclick="f('all',this)"><i class="fas fa-grid"></i><br>All</button>
<button class="nav-btn" onclick="f('Cricket',this)"><i class="fas fa-baseball"></i><br>Cricket</button>
<button class="nav-btn" onclick="f('Football',this)"><i class="fas fa-futbol"></i><br>Football</button>
<button class="nav-btn" onclick="f('Tennis',this)"><i class="fas fa-table-tennis"></i><br>Tennis</button>
</nav>

<div id="qm" class="modal">
<div class="modal-box">
<h2>Select Quality</h2>
<div id="ql"></div>
<button onclick="cm()">Cancel</button>
</div>
</div>

<div class="player" id="p">
<div class="player-header">
<button class="player-btn" onclick="cp()"><i class="fas fa-arrow-left"></i></button>
<div class="player-title" id="pt">Playing...</div>
</div>
<div class="player-video">
<video id="v" autoplay playsinline></video>
</div>
</div>

<!-- ✅ TELEGRAM POPUP -->
<div id="telegram-popup" style="position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#0f172a;border:1px solid rgba(255,255,255,0.1);padding:25px;border-radius:16px;max-width:320px;text-align:center;">
    <h2 style="font-size:20px;margin-bottom:10px;">🚀 Never Miss a Match!</h2>
    <p style="font-size:13px;color:#94a3b8;margin-bottom:20px;">
      ⚡ Instant Live Links<br>
      🔥 Fastest Updates<br>
      🎯 Predictions
    </p>
    <a href="https://t.me/addlist/6qALMSdKoVVkNWI1" target="_blank" style="display:block;padding:12px;background:#38bdf8;color:black;border-radius:8px;text-decoration:none;margin-bottom:10px;">
      Join Telegram
    </a>
    <button onclick="closeTG()" style="padding:10px;background:#1e293b;color:#94a3b8;border:none;border-radius:8px;width:100%;">Later</button>
  </div>
</div>

<script>
/* 🔒 ORIGINAL JS UNCHANGED */
const AP="https://a7.akcoder777.workers.dev/fc";
let M=[],ft='all',pi=0;
/* (same functions unchanged) */
function pd(s){try{const p=s.replace(/\s+/g,' ').trim().split(' '),m={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};let h=parseInt(p[3])||0,min=parseInt(p[4])||0;if(p[5]==='PM'&&h!==12)h+=12;if(p[5]==='AM'&&h===12)h=0;return new Date(p[2],m[p[1]],p[0],h,min).getTime();}catch(e){return Date.now()+3600000;}}
function fd(ts){if(!ts)return 'TBA';const d=new Date(ts);if(d.toString()==='Invalid Date')return 'TBA';const opt={month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'};return d.toLocaleString('en-US',opt);}
function nm(d){let a=[];(d.matches||[]).forEach(m=>{let r={};if(m.all_resolutions)Object.keys(m.all_resolutions).forEach(x=>{if(m.all_resolutions[x]?.includes('.m3u8'))r[x]=m.all_resolutions[x];});const isLive=['live','LIVE','started','STARTED'].includes(m.type||m.status);a.push({id:m.match_id||Math.random(),t:m.match,tr:m.tournament,c:m.category,l:m.language,img:m.image,li:isLive,en:!isLive,u:m.stream_url||r['1080p']||r['720p']||'',r:r,tm:pd(m.startTime)});});(d.upcoming_matches||[]).forEach(m=>{a.push({id:m.match_id||Math.random(),t:m.match,tr:m.tournament,c:m.category,l:m.language,img:m.image,li:false,en:false,u:'',r:{},tm:pd(m.startTime)});});return a.sort((a,b)=>(b.li?1:0)-(a.li?1:0)||a.tm-b.tm);}
function rn(){const f=ft==='all'?M:M.filter(m=>m.c?.toLowerCase()===ft.toLowerCase());document.getElementById('g').innerHTML=!f.length?'<div class="loader"><i class="fas fa-inbox"></i><p>No matches</p></div>':f.map(m=>{const badgeText=m.li?'LIVE':m.en?'ENDED':'UPCOMING';const badgeClass=m.li?'':m.en?'badge-ended':'badge-up';return `<div class="card" onclick="pl(${M.indexOf(m)})"><div class="card-img"><img src="${m.img||'https://via.placeholder.com/250x140'}"><span class="badge ${badgeClass}">${badgeText}</span></div><div class="card-info"><div class="card-title">${m.t}</div></div></div>`}).join('');}
function pl(i){if(M[i].en){alert('Match Ended');return;}if(!M[i].li){alert('Starts: '+fd(M[i].tm));return;}if(Object.keys(M[i].r).length>1)sq(i);else if(M[i].u)ps(M[i],M[i].u);else alert('No stream');}
function sq(i){const rs=Object.keys(M[i].r).sort((a,b)=>parseInt(b)-parseInt(a));document.getElementById('ql').innerHTML=rs.map(r=>`<button onclick="ps(M[${i}],M[${i}].r['${r}']);cm()">${r}</button>`).join('');document.getElementById('qm').classList.add('active');}
async function ps(m,u){if(!u)return;document.getElementById('pt').innerText=m.t;document.getElementById('p').classList.add('active');const v=document.getElementById('v');v.currentTime=0;try{if(!pi){window.player=new Plyr('#v');pi=1;}v.src=u;v.type='application/x-mpegURL';await v.load();setTimeout(()=>{v.play().catch(e=>{v.muted=true;v.play();})},100);}catch(e){v.src=u;v.type='application/x-mpegURL';v.play().catch(()=>{v.muted=true;v.play();});}}
function f(t,b){ft=t;document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');rn();}
function cm(){document.getElementById('qm').classList.remove('active');}
function cp(){document.getElementById('p').classList.remove('active');const v=document.getElementById('v');v.pause();v.currentTime=0;v.src='';if(window.player){try{window.player.destroy();}catch(e){}pi=0;}}
async function ld(){try{const r=await fetch(AP);const d=await r.json();M=nm(d);rn();showTG();}catch(e){document.getElementById('g').innerHTML='Load Error';}}
ld();

/* TELEGRAM POPUP */
function showTG(){
if(!localStorage.getItem("tg_seen")){
setTimeout(()=>{document.getElementById("telegram-popup").style.display="flex";},3000);
}}
function closeTG(){
document.getElementById("telegram-popup").style.display="none";
localStorage.setItem("tg_seen","1");
}
</script>

</body>
</html>
